<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini - Bahan Ajar Otomatis SMK</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome untuk Icon Sidebar -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap Icons (Untuk memperbaiki icon Gemini & User yang rusak) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f0f4f9] text-[#1f1f1f] min-h-screen flex flex-col md:flex-row">

    <!-- SIDEBAR: Form Input -->
    <aside class="w-full md:w-[380px] bg-[#f8fafc] border-b md:border-b-0 md:border-r border-[#e3e3e3] p-6 flex flex-col h-screen overflow-y-auto shrink-0">
        <div class="flex items-center gap-3 mb-6">
            <div class="p-2 bg-blue-600 text-white rounded-xl shadow-md">
                <i class="fa-solid fa-graduation-cap text-xl"></i>
            </div>
            <div>
                <h1 class="text-md font-bold text-slate-900 tracking-tight">E-Modul Generator</h1>
                <p class="text-xs text-slate-500">Rumpun SMK Abad 21</p>
            </div>
        </div>

        <form id="generatorForm" class="space-y-5 text-sm flex-1">
            <div class="space-y-3">
                <span class="text-xs font-bold text-blue-600 tracking-wider uppercase block">A. Informasi Pembelajaran</span>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Mata Pelajaran</label>
                    <select id="mapel" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 focus:border-blue-500 focus:outline-none transition" required>
                        <option value="">-- Pilih Mapel --</option>
                        <option value="Bahasa Indonesia">Bahasa Indonesia</option>
                        <option value="Bahasa Inggris">Bahasa Inggris</option>
                        <option value="Matematika">Matematika</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Materi / Topik</label>
                    <input id="topik" type="text" placeholder="Contoh: Teks Puisi atau Narasi" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 focus:border-blue-500 focus:outline-none transition" required>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-medium text-slate-600 mb-1">Kelas</label>
                        <select id="kelas" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 focus:border-blue-500 focus:outline-none transition">
                            <option value="Kelas X (Fase E)">Kelas X (Fase E)</option>
                            <option value="Kelas XI (Fase F)">Kelas XI (Fase F)</option>
                            <option value="Kelas XII (Fase F)">Kelas XII (Fase F)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-600 mb-1">Program Keahlian</label>
                        <select id="jurusan" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 focus:border-blue-500 focus:outline-none transition">
                            <option value="Semua Jurusan">Semua Jurusan</option>
                            <option value="Desain Komunikasi Visual (DKV)">DKV</option>
                            <option value="Manajemen Perkantoran dan Layanan Bisnis (MPLB)">MPLB</option>
                            <option value="Akuntansi dan Keuangan Lembaga (AKL)">AKL</option>
                            <option value="Bisnis Digital (BD)">BD</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Tujuan Pembelajaran</label>
                    <textarea id="tp" rows="2" placeholder="Siswa mampu..." class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 focus:border-blue-500 focus:outline-none transition" required></textarea>
                </div>
            </div>

            <hr class="border-slate-200">

            <div class="space-y-3">
                <span class="text-xs font-bold text-emerald-600 tracking-wider uppercase block">B. Kontekstualisasi</span>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Tingkat Kontekstualisasi</label>
                    <select id="konteks" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 focus:border-blue-500 focus:outline-none transition">
                        <option value="Dunia Kerja dan Industri">Dunia Kerja dan Industri</option>
                        <option value="Kehidupan Sehari-hari">Kehidupan Sehari-hari</option>
                        <option value="Lingkungan Sekolah">Lingkungan Sekolah</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Studi Kasus</label>
                    <select id="kasus" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 focus:border-blue-500 focus:outline-none transition">
                        <option value="Otomatis oleh AI">Otomatis oleh AI</option>
                        <option value="Industri Kreatif">Industri Kreatif</option>
                        <option value="Administrasi Perkantoran">Administrasi Perkantoran</option>
                        <option value="Akuntansi dan Keuangan">Akuntansi dan Keuangan</option>
                        <option value="Bisnis dan Pemasaran">Bisnis dan Pemasaran</option>
                    </select>
                </div>
            </div>

            <hr class="border-slate-200">

            <div class="space-y-3">
                <span class="text-xs font-bold text-purple-600 tracking-wider uppercase block">C. Produk</span>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Kedalaman Materi</label>
                    <select id="kedalaman" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 focus:border-blue-500 focus:outline-none transition">
                        <option value="Dasar">Dasar (Basic)</option>
                        <option value="Menengah">Menengah (Standar)</option>
                        <option value="Lanjutan">Lanjutan (Advanced)</option>
                    </select>
                </div>
            </div>

            <button type="button" onclick="generateBahanAjar()" class="w-full bg-[#1a73e8] hover:bg-blue-700 text-white font-medium py-3 rounded-xl transition shadow-md shadow-blue-100 flex items-center justify-center gap-2 mt-4 cursor-pointer">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Mulai Generate
            </button>
        </form>
    </aside>

    <!-- MAIN VIEW -->
    <main class="flex-1 bg-white h-screen overflow-y-auto flex flex-col">
        <header class="sticky top-0 bg-white/90 backdrop-blur-md border-b border-[#e3e3e3] px-6 py-4 flex items-center justify-between z-10">
            <div class="flex items-center gap-2">
                <!-- MEMPERBAIKI LOGO GEMINI HEADER -->
                <i class="bi bi-stars text-blue-600 text-xl animate-pulse"></i>
                <span class="text-md font-medium text-slate-700 tracking-tight">Percakapan Publik Gemini</span>
            </div>
            <div>
                <button onclick="salinHasil()" class="text-xs font-medium text-[#1a73e8] hover:bg-blue-50 border border-[#e3e3e3] px-4 py-2 rounded-full flex items-center gap-2 transition cursor-pointer">
                    <i class="fa-regular fa-copy"></i> Salin Teks
                </button>
            </div>
        </header>

        <div class="flex-1 max-w-3xl w-full mx-auto px-6 py-10 space-y-10" id="chatArea">
            <div id="placeholder" class="text-center py-20">
                <i class="bi bi-stars text-slate-300 text-5xl block mb-4 animate-bounce"></i>
                <h2 class="text-xl font-semibold text-slate-800">Aplikasi Pengubah Materi SMK</h2>
                <p class="text-sm text-slate-500 mt-2 max-w-md mx-auto">Isi konfigurasi bahan ajar di panel kiri, kemudian klik tombol "Mulai Generate" untuk memicu AI.</p>
            </div>

            <!-- Balon Prompt User -->
            <div id="userBubble" class="hidden flex items-start gap-4">
                <div class="w-8 h-8 rounded-full bg-purple-600 text-white flex items-center justify-center text-xs font-bold font-sans tracking-wider shrink-0 shadow">SMK</div>
                <div class="bg-[#f0f4f9] px-4 py-3 rounded-2xl text-sm max-w-[85%] text-slate-800 font-medium leading-relaxed" id="userPromptText"></div>
            </div>

            <!-- Balon Response Gemini AI -->
            <div id="geminiBubble" class="hidden flex items-start gap-4">
                <!-- MEMPERBAIKI LOGO GEMINI DI CHAT BUBBLE -->
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-600 to-indigo-400 text-white flex items-center justify-center shrink-0 shadow">
                    <i class="bi bi-stars text-sm"></i>
                </div>
                <div class="flex-1 space-y-6 text-[15px] leading-relaxed text-[#1f1f1f]" id="geminiResponseText">
                    <div id="aiLoader" class="flex gap-1 items-center py-2">
                        <div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce"></div>
                        <div class="w-2 h-2 bg-blue-400 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                        <div class="w-2 h-2 bg-blue-300 rounded-full animate-bounce [animation-delay:0.4s]"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function generateBahanAjar() {
            const mapel = document.getElementById('mapel').value;
            const topik = document.getElementById('topik').value;
            const kelas = document.getElementById('kelas').value;
            const jurusan = document.getElementById('jurusan').value;
            const tp = document.getElementById('tp').value;
            const kasus = document.getElementById('kasus').value;
            const kedalaman = document.getElementById('kedalaman').value;

            if (!mapel || !topik || !tp) {
                alert('Tolong lengkapi kolom Mata Pelajaran, Topik, dan Tujuan Pembelajaran dahulu!');
                return;
            }

            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('userBubble').classList.remove('hidden');
            document.getElementById('geminiBubble').classList.remove('hidden');
            document.getElementById('aiLoader').classList.remove('hidden');

            document.getElementById('userPromptText').innerText = `Halo Gemini, tolong buatkan draf E-Modul Interaktif untuk mata pelajaran ${mapel} materi "${topik}" bagi siswa ${kelas} jurusan ${jurusan}. Buat bermuatan studi kasus ${kasus} dengan kedalaman level ${kedalaman}.`;

            const responseContainer = document.getElementById('geminiResponseText');
            const loaderHtml = document.getElementById('aiLoader').outerHTML;
            responseContainer.innerHTML = loaderHtml;

            try {
                const response = await fetch('/api/generate-bahan-ajar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mapel, topik, kelas, jurusan, tp, kasus, kedalaman })
                });

                const hasil = await response.json();
                document.getElementById('aiLoader').classList.add('hidden');

                if (hasil.success) {
                    const textNode = document.createElement('div');
                    textNode.className = "space-y-6";
                    textNode.innerHTML = hasil.data;
                    responseContainer.appendChild(textNode);
                } else {
                    responseContainer.innerHTML += `<p class="text-red-500 flex items-center gap-2"><i class="bi bi-exclamatari-circle"></i> Terjadi kesalahan: ${hasil.message}</p>`;
                }
            } catch (error) {
                document.getElementById('aiLoader').classList.add('hidden');
                responseContainer.innerHTML += `<p class="text-red-500 flex items-center gap-2"><i class="bi bi-exclamatari-circle"></i> Gagal terhubung ke server backend.</p>`;
            }
        }

        function salinHasil() {
            const outputText = document.getElementById('geminiResponseText').innerText;
            if (!outputText || outputText.trim() === "" || outputText.includes("Gagal")) {
                alert('Belum ada teks materi yang bisa disalin!');
                return;
            }
            navigator.clipboard.writeText(outputText);
            alert('Sukses! Teks draf materi ala Gemini berhasil disalin ke clipboard.');
        }
    </script>
</body>
</html>
